<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADP Volley-Ball — Diagnostic &amp; Planification · DI-VLB · CRMEF Inezgane</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Literata:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Literata',serif;background:#F2F5F9;color:#0B1F35;min-height:100vh;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
table{border-collapse:collapse;width:100%}
.app-wrap{display:flex;flex-direction:column;min-height:100vh}
/* ── HEADER ── */
header{background:linear-gradient(135deg,#0B1F35 0%,#1A3A5A 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(11,31,53,.18)}
.hdr-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;gap:16px}
.hdr-logo{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;padding:0}
.hdr-logo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;line-height:1.1;text-align:left}
.hdr-logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:#7AABCE;letter-spacing:.06em;text-transform:uppercase}
.hdr-steps{display:flex;align-items:center;gap:0;flex:1;justify-content:center;overflow:hidden}
.hdr-step{display:flex;flex-direction:column;align-items:center;gap:2px;opacity:.4;min-width:60px;transition:opacity .2s}
.hdr-step.active,.hdr-step.done{opacity:1}
.hdr-step-dot{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:#fff}
.hdr-step.active .hdr-step-dot{background:#E8621A}
.hdr-step.done .hdr-step-dot{background:#16A34A}
.hdr-step-lbl{font-family:'DM Mono',monospace;font-size:8px;color:#7AABCE;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.hdr-step.active .hdr-step-lbl{color:#F5A96A}
.hdr-connector{flex:1;height:1px;background:rgba(255,255,255,.12);max-width:32px}
.hdr-connector.done{background:#16A34A}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn-print{font-family:'DM Mono',monospace;font-size:10px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:5px 12px;letter-spacing:.04em}
.btn-nav{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:#fff;border:none;border-radius:8px;padding:7px 16px}
.btn-nav.start{background:#E8621A}
.btn-nav.back{background:rgba(255,255,255,.1)}
/* ── HOME ── */
.hero{background:linear-gradient(145deg,#0B1F35 0%,#1A4A7A 55%,#1E6AAA 100%);color:#fff;padding:80px 24px 100px;text-align:center;position:relative;overflow:hidden}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(232,98,26,.18);border:1px solid rgba(232,98,26,.4);border-radius:100px;padding:5px 16px;margin-bottom:20px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;color:#F5A96A;text-transform:uppercase}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,5vw,52px);line-height:1.1;margin-bottom:16px;letter-spacing:-.01em}
.hero h1 span{color:#F5A96A}
.hero-sub{font-family:'Literata',serif;font-size:17px;color:rgba(255,255,255,.72);line-height:1.65;margin-bottom:12px;font-style:italic}
.hero-note{font-family:'Literata',serif;font-size:14px;color:rgba(255,255,255,.50);line-height:1.5;margin-bottom:40px}
.btn-hero{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;background:#E8621A;color:#fff;border:none;border-radius:12px;padding:16px 40px;letter-spacing:.01em;transition:background .2s}
.btn-hero:hover{background:#C85214}
.home-section{background:#fff;padding:60px 24px}
.home-section.gray{background:#F2F5F9}
.section-inner{max-width:1000px;margin:0 auto}
.section-center{text-align:center;margin-bottom:32px}
.section-tag{font-family:'DM Mono',monospace;font-size:11px;color:#E8621A;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.section-h2{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:#0B1F35}
.couches-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:40px}
.couche-card{background:#F8FAFC;border:1.5px solid #E2EAF2;border-radius:12px;padding:18px 16px;text-align:center}
.couche-icon{font-size:24px;margin-bottom:8px}
.couche-code{font-family:'DM Mono',monospace;font-size:10px;color:#E8621A;letter-spacing:.08em;margin-bottom:5px;text-transform:uppercase}
.couche-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#0B1F35;margin-bottom:6px}
.couche-desc{font-family:'Literata',serif;font-size:12px;color:#4A6278;line-height:1.5;font-style:italic}
.steps-bar{background:#0B1F35;border-radius:14px;padding:28px;display:flex;gap:0;align-items:stretch;flex-wrap:wrap}
.step-block{flex:1;min-width:140px;padding:16px;border-right:1px solid rgba(255,255,255,.1);text-align:center}
.step-block:last-child{border-right:none}
.step-num{font-family:'DM Mono',monospace;font-size:26px;color:#E8621A;font-weight:500;margin-bottom:8px}
.step-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;margin-bottom:6px}
.step-desc{font-family:'Literata',serif;font-size:12px;color:rgba(255,255,255,.55);line-height:1.5;font-style:italic;margin-bottom:6px}
.step-extra{font-family:'DM Mono',monospace;font-size:10px;color:#F5A96A;letter-spacing:.05em}
.obs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.obs-card{background:#fff;border:1.5px solid #D4DDE8;border-radius:12px;overflow:hidden}
.obs-head{background:#0B1F35;padding:12px 16px;display:flex;gap:8px;align-items:center}
.obs-code{font-family:'DM Mono',monospace;font-size:13px;color:#E8621A;font-weight:500}
.obs-crit{font-family:'DM Mono',monospace;font-size:10px;color:#7AABCE;letter-spacing:.05em}
.obs-lbl{font-family:'Syne',sans-serif;font-weight:600;font-size:12px;color:#fff;flex:1}
.obs-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.deg-row{display:flex;gap:10px;align-items:flex-start}
.deg-badge{font-family:'DM Mono',monospace;font-weight:500;font-size:13px;border-radius:6px;padding:2px 8px;flex-shrink:0}
.deg-badge.A{color:#DC2626;background:#FEF2F2}
.deg-badge.B{color:#D97706;background:#FFF7ED}
.deg-badge.C{color:#16A34A;background:#F0FDF4}
.deg-txt{font-family:'Literata',serif;font-size:12.5px;color:#2D4059;line-height:1.45;padding-top:2px;font-style:italic}
.cta-section{background:#E8621A;padding:48px 24px;text-align:center}
.cta-section h2{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:#fff;margin-bottom:16px}
.cta-section p{font-family:'Literata',serif;font-size:15px;color:rgba(255,255,255,.85);line-height:1.6;margin-bottom:28px;font-style:italic}
.btn-cta-inv{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;background:#fff;color:#E8621A;border:none;border-radius:10px;padding:14px 36px}
/* ── TOOL COMMON ── */
main{flex:1}
.tool-inner{max-width:1200px;margin:0 auto;padding:36px 24px 64px}
.tool-inner.narrow{max-width:900px}
.tool-inner.mid{max-width:800px}
.step-tag{font-family:'DM Mono',monospace;font-size:11px;color:#E8621A;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.step-h{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;color:#0B1F35;margin-bottom:6px}
.step-note{font-family:'Literata',serif;font-size:14px;color:#4A6278;font-style:italic;line-height:1.55}
.card{background:#fff;border:1.5px solid #D4DDE8;border-radius:14px;overflow:hidden;margin-bottom:20px}
.card-head{background:#F8FAFC;border-bottom:1px solid #E2EAF2;padding:14px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#0B1F35;display:flex;justify-content:space-between;align-items:center}
.card-body{padding:16px 20px}
/* ── ENTRY FORM ── */
.obs-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.obs-chip{background:#F8FAFC;border:1px solid #D4DDE8;border-radius:8px;padding:7px 12px;display:flex;gap:8px;align-items:center;font-size:12px}
.obs-chip-code{font-family:'DM Mono',monospace;font-size:11px;color:#E8621A;font-weight:500}
.obs-chip-lbl{font-family:'Literata',serif;font-size:12px;color:#4A6278}
.csv-row{padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.btn-csv{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;background:#F2F5F9;color:#0B1F35;border:1.5px solid #D4DDE8;border-radius:8px;padding:9px 18px}
.csv-hint{font-family:'Literata',serif;font-size:12px;color:#7A8FA6;font-style:italic}
.csv-error{font-family:'DM Mono',monospace;font-size:11px;color:#DC2626}
.btn-demo{font-family:'DM Mono',monospace;font-size:10px;background:#E8F4FD;color:#1A4A7A;border:1px solid #B3D0E8;border-radius:6px;padding:4px 10px;letter-spacing:.04em}
.form-table th{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;color:#4A6278;padding:10px 12px;text-align:left;white-space:nowrap;background:#F2F5F9}
.form-table td{padding:6px 10px;border-top:1px solid #E8EEF4}
.form-input{padding:6px 10px;border:1px solid #D4DDE8;border-radius:7px;font-family:'Literata',serif;font-size:13px;color:#0B1F35;background:#fff;outline:none;width:100%}
.form-input.name-input{width:130px}
.form-input.num-input{width:80px}
.form-input.err{border-color:#FCA5A5}
.form-err-msg{font-family:'DM Mono',monospace;font-size:9px;color:#DC2626;max-width:120px}
.btn-rm{background:none;border:none;color:#FCA5A5;font-size:16px;line-height:1;padding:2px 4px}
.btn-add-row{font-family:'DM Mono',monospace;font-size:11px;color:#1A4A7A;background:none;border:1.5px dashed #B3D0E8;border-radius:8px;padding:6px 16px;letter-spacing:.04em}
.btn-analyse{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;background:#E8621A;color:#fff;border:none;border-radius:10px;padding:14px 36px}
/* ── STEP 1 DIAGNOSTIC ── */
.profile-badge{font-family:'DM Mono',monospace;font-weight:500;font-size:12px;border-radius:6px;padding:2px 8px;display:inline-block}
.profile-badge.A{color:#DC2626;background:#FEF2F2;border:1.5px solid #FCA5A5}
.profile-badge.B{color:#D97706;background:#FFF7ED;border:1.5px solid #FCD34D}
.profile-badge.C{color:#16A34A;background:#F0FDF4;border:1.5px solid #86EFAC}
.diag-table th{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;color:#94B8D4;padding:10px 10px;text-align:left;white-space:nowrap;background:#0B1F35}
.diag-table td{padding:8px 10px;border-top:1px solid #E8EEF4;font-size:12px}
.bilan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.bilan-card{border-radius:12px;padding:16px;text-align:center;border:2px solid}
.bilan-count{font-family:'Syne',sans-serif;font-weight:800;font-size:28px}
.bilan-lbl{font-family:'DM Mono',monospace;font-size:12px;margin-bottom:4px}
.bilan-pct{font-family:'Literata',serif;font-size:12px;color:#4A6278}
.obs-bar-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.obs-bar-lbl{font-family:'DM Mono',monospace;font-size:12px;color:#4A6278;min-width:230px}
.obs-bar-track{flex:1;min-width:120px;background:#E8EEF4;border-radius:100px;height:8px;position:relative;overflow:hidden}
.obs-bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:100px;transition:width .4s}
.obs-bar-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:#0B1F35;min-width:40px}
.obs-bar-status{font-family:'Literata',serif;font-size:12px;font-style:italic}
.group-row{display:flex;gap:12px;align-items:flex-start;border-radius:8px;padding:10px 14px;margin-bottom:8px}
.group-names{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;color:#0B1F35}
.group-sa{font-family:'DM Mono',monospace;font-size:10px;color:#4A6278;margin-top:3px;letter-spacing:.04em}
.decision-bar{background:#0B1F35;border-radius:12px;padding:16px 20px;display:flex;gap:14px;align-items:center;margin-top:12px}
.decision-txt{flex:1}
.decision-code{font-family:'DM Mono',monospace;font-size:10px;color:#7AABCE;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.decision-msg{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff}
.decision-note{font-family:'Literata',serif;font-size:12px;color:rgba(255,255,255,.5);font-style:italic;margin-top:4px}
.btn-next{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;background:#E8621A;color:#fff;border:none;border-radius:10px;padding:14px 36px;margin-top:20px}
.btn-back{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;background:#fff;color:#4A6278;border:1.5px solid #D4DDE8;border-radius:8px;padding:12px 24px}
.btn-export{font-family:'DM Mono',monospace;font-size:11px;background:#F2F5F9;color:#0B1F35;border:1.5px solid #D4DDE8;border-radius:8px;padding:8px 16px;letter-spacing:.04em}
.flex-btns{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
/* ── STEP 2 AXES ── */
.axes-meta{margin-top:10px;font-family:'DM Mono',monospace;font-size:12px}
.axes-meta.ok{color:#16A34A}
.axes-meta.warn{color:#D97706}
.axe-card{background:#fff;border:2px solid #D4DDE8;border-radius:12px;padding:16px 20px;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:14px}
.axe-card.selected{background:#EEF6FF;border-color:#2563A8}
.axe-inner{display:flex;gap:14px;align-items:flex-start}
.axe-check{flex-shrink:0;width:24px;height:24px;border:2px solid #D4DDE8;border-radius:5px;background:#fff;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:13px;color:#fff;transition:all .15s}
.axe-card.selected .axe-check{background:#2563A8;border-color:#2563A8}
.axe-content{flex:1}
.axe-badges{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.axe-id{font-family:'DM Mono',monospace;font-size:11px;color:#E8621A;font-weight:500}
.axe-rank{font-family:'DM Mono',monospace;font-size:10px;color:#7A8FA6;background:#F2F5F9;border-radius:6px;padding:2px 8px}
.axe-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#0B1F35;margin-bottom:8px;line-height:1.4}
.axe-stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.axe-stat{font-family:'DM Mono',monospace;font-size:11px}
.axe-stat.high{color:#DC2626}
.axe-stat.mid{color:#D97706}
.axe-stat.low{color:#16A34A}
.axe-stat.neutral{color:#7A8FA6}
.axe-stat.blue{color:#1A4A7A}
.axe-caps{display:flex;gap:6px;flex-wrap:wrap}
.axe-cap{font-family:'DM Mono',monospace;font-size:10px;color:#4A6278;background:#F2F5F9;border-radius:5px;padding:2px 8px}
/* ── STEP 3 PARAMÉTRAGE ── */
.range-row{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.range-row input[type=range]{flex:1;accent-color:#E8621A;cursor:pointer}
.range-val{text-align:center;min-width:140px}
.range-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:#E8621A;line-height:1}
.range-unit{font-family:'DM Mono',monospace;font-size:10px;color:#7A8FA6;letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.range-info{background:#F8FAFC;border-radius:10px;padding:12px 16px;font-family:'DM Mono',monospace;font-size:12px;color:#1A4A7A;margin-bottom:20px}
.seq-preview{display:flex;flex-direction:column;gap:10px}
.seq-row{display:flex;gap:14px;align-items:flex-start;background:#fff;border:1.5px solid #E2EAF2;border-radius:10px;padding:14px 16px}
.seq-num-box{background:#0B1F35;color:#E8621A;border-radius:8px;width:36px;height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace}
.seq-num-label{font-size:8px;color:#7AABCE;letter-spacing:.04em}
.seq-num-val{font-size:14px;font-weight:500;line-height:1}
.seq-seances{font-family:'DM Mono',monospace;font-size:10px;color:#E8621A;margin-bottom:3px;letter-spacing:.05em}
.seq-title{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;color:#0B1F35;line-height:1.35}
.seq-note{font-family:'DM Mono',monospace;font-size:10px;color:#7A8FA6;margin-top:4px}
/* ── STEP 4 PLANNING ── */
.plan-section{margin-bottom:32px}
.seq-header{background:#0B1F35;border-radius:12px 12px 0 0;padding:16px 20px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.seq-info{flex:1}
.seq-meta{font-family:'DM Mono',monospace;font-size:10px;color:#7AABCE;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.seq-main-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#fff;margin-bottom:4px}
.seq-obj{font-family:'Literata',serif;font-size:13px;color:rgba(255,255,255,.65);font-style:italic}
.seq-axe-tags{display:flex;gap:8px;flex-wrap:wrap}
.seq-axe-tag{font-family:'DM Mono',monospace;font-size:10px;color:#F5A96A;background:rgba(232,98,26,.15);border:1px solid rgba(232,98,26,.3);border-radius:6px;padding:3px 10px;letter-spacing:.04em}
.plan-table-wrap{border:1.5px solid #D4DDE8;border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.plan-table{overflow-x:auto}
.plan-table table th{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;color:#4A6278;padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid #D4DDE8;background:#F2F5F9}
.plan-table table td{padding:10px 12px;border-top:1px solid #E8EEF4;vertical-align:top;font-size:11px}
.td-seance{font-family:'DM Mono',monospace;font-weight:500;font-size:13px;color:#E8621A;white-space:nowrap}
.td-axe{font-family:'DM Mono',monospace;font-size:11px;color:#1A4A7A}
.td-obj{font-family:'Syne',sans-serif;font-weight:600;font-size:12px;color:#0B1F35;max-width:160px}
.td-grp{max-width:200px}
.td-grp-code{font-family:'DM Mono',monospace;font-size:10px;margin-bottom:3px}
.td-grp-desc{font-family:'Literata',serif;font-size:11px;color:#2D4059;line-height:1.4;margin-bottom:4px}
.td-grp-crit{font-family:'DM Mono',monospace;font-size:10px;font-style:italic}
.td-grp.ga{background:#FEF2F2}
.td-grp.gb{background:#FFFBEB}
.td-grp.gc{background:#F0FDF4}
.td-grp.ga .td-grp-code{color:#DC2626}
.td-grp.gb .td-grp-code{color:#D97706}
.td-grp.gc .td-grp-code{color:#16A34A}
.td-grp.ga .td-grp-crit{color:#DC2626}
.td-grp.gb .td-grp-crit{color:#D97706}
.td-grp.gc .td-grp-crit{color:#16A34A}
.indic-row{background:#F8FAFC}
.indic-row td{padding:6px 12px 8px 48px;border-bottom:1px solid #E8EEF4}
.indic-content{display:flex;gap:10px;align-items:flex-start;font-family:'DM Mono',monospace;font-size:10px}
.indic-note{color:#4A6278;letter-spacing:.04em}
.indic-sub{color:#7A8FA6;font-style:italic}
.resume-table th{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;color:#4A6278;padding:10px 14px;text-align:left}
.resume-table td{padding:10px 14px;border-top:1px solid #E8EEF4}
.plan-footer{background:#0B1F35;border-radius:0 0 12px 12px;padding:16px 20px}
.plan-footer p{font-family:'Literata',serif;font-size:13px;color:rgba(255,255,255,.8);line-height:1.6}

function scoreToProfile(s){ return s < 4.5 ? "A" : s < 7.5 ? "B" : "C"; }

function profileColor(p){
  return { A:{bg:"#FEF2F2",border:"#FCA5A5",text:"#B91C1C",badge:"#DC2626"}, B:{bg:"#FFF7ED",border:"#FCD34D",text:"#B45309",badge:"#D97706"}, C:{bg:"#F0FDF4",border:"#86EFAC",text:"#15803D",badge:"#16A34A"} }[p];
}

function getDistribution(nAxes, nSeances){

function lacunePct(obsCode){
  const idx = obsCode === "OBS-01" ? 0 : obsCode === "OBS-02" ? 1 : 2;
  if (!S.students.length) return 0;
  const scores = S.students.map(s => [s.obs1,s.obs2,s.obs3][idx]);
  return Math.round(scores.filter(v => v < 4.5).length / scores.length * 100);
}

function classMoy(obsCode){
  const idx = obsCode === "OBS-01" ? 0 : obsCode === "OBS-02" ? 1 : 2;
  if (!S.students.length) return 0;
  const scores = S.students.map(s => [s.obs1,s.obs2,s.obs3][idx]);
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10;
}

function computeStudents(raw){
  const moyennes = raw.map(s=>(s.obs1+s.obs2+s.obs3)/3);
  const sorted = [...moyennes].sort((a,b)=>b-a);
  return raw.map((s,i)=>{
    const moy = moyennes[i];
    const p1=scoreToProfile(s.obs1), p2=scoreToProfile(s.obs2), p3=scoreToProfile(s.obs3);
    const pg=scoreToProfile(moy);
    const lacunes=[];
    [{score:s.obs1,obs:OBSERVABLES[0]},{score:s.obs2,obs:OBSERVABLES[1]},{score:s.obs3,obs:OBSERVABLES[2]}]
      .filter(x=>x.score<4.5).sort((a,b)=>a.score-b.score)
      .forEach(x=>lacunes.push({label:x.obs.shortLabel,score:x.score,code:x.obs.code}));
    const obsMatch = lacunes[0] ? OBSERVABLES.find(o=>o.code===lacunes[0].code) : null;
    const axePrioritaire = obsMatch ? obsMatch.axePrioritaire : "Approfondir le projet de jeu collectif et la lecture du jeu adverse (N2-7 · N2-9)";
    const saRecommandee = obsMatch ? (pg==="A"?obsMatch.saA:pg==="B"?obsMatch.saB:obsMatch.saC) : OBSERVABLES[0].saC;
    const rank = sorted.indexOf(moy)+1;
    return { ...s, moyenne:Math.round(moy*10)/10, note20:Math.round(moy*2*10)/10, rang:rank,
      profilGlobal:pg, profObs1:p1, profObs2:p2, profObs3:p3, lacunes, axePrioritaire, saRecommandee };
  });
}

function parseCSV(text){
  const lines = text.split(/\r?\n/);
  let headerIdx=-1;
  for(let i=0;i<lines.length;i++){ if(lines[i].toLowerCase().includes("nom_eleve")){headerIdx=i;break;} }
  if(headerIdx===-1) return {err:'En-tête "Nom_Eleve" introuvable dans le fichier CSV.'};
  const headers=lines[headerIdx].split(/[,;]/).map(h=>h.trim().toLowerCase());
  const nameIdx=headers.findIndex(h=>h.includes("nom_eleve")||h.includes("prenom")||h.includes("nom"));
  if(nameIdx===-1) return {err:"Colonne nom/prénom introuvable."};
  const mapDeg=v=>{const u=v.trim().toUpperCase();if(u==="A")return 3;if(u==="B")return 6;if(u==="C")return 9;const n=parseFloat(v);return isNaN(n)?null:Math.min(10,Math.max(0,n));};
  const getScore=(cols,n)=>{
    const p2=headers.findIndex(h=>h===`obs0${n}_degre`);
    if(p2!==-1&&cols[p2]){const v=mapDeg(cols[p2]);if(v!==null)return v;}
    const p3=headers.findIndex(h=>h===`obs${n}`);
    if(p3!==-1&&cols[p3]){const v=parseFloat(cols[p3]);if(!isNaN(v))return Math.min(10,Math.max(0,v));}
    return null;
  };
  const students=[]; let ignored=0;
  for(let i=headerIdx+1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line||line.toLowerCase().includes("bilan")){ignored++;continue;}
    const cols=line.split(/[,;]/).map(c=>c.trim());
    const prenom=cols[nameIdx];
    if(!prenom){ignored++;continue;}
    const obs1=getScore(cols,"1"),obs2=getScore(cols,"2"),obs3=getScore(cols,"3");
    if(obs1===null||obs2===null||obs3===null){ignored++;continue;}
    students.push({prenom,obs1,obs2,obs3});
  }
  if(!students.length) return {err:`Aucun élève valide (${ignored} lignes ignorées).`};
  return {students};
}

    const pInput=tr.querySelector('[data-field="prenom"]');

    });

}

function handleCSV(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const res=parseCSV(e.target.result);
    if(res.err){document.getElementById("csv-error").textContent="⚠ "+res.err;return;}
    document.getElementById("csv-error").textContent="";
    S.rows=res.students.map(s=>({prenom:s.prenom,obs1:String(s.obs1),obs2:String(s.obs2),obs3:String(s.obs3),err:""}));
    renderEntrySection();
    analyseClass();
  };
  reader.readAsText(file,"UTF-8");
}

function analyseClass(){
  saveRows();
  const rawValid=[];
  let hasErr=false;
  S.rows=S.rows.map(r=>{
    if(!r.prenom.trim()&&!r.obs1&&!r.obs2&&!r.obs3)return{...r,err:""};
    if(!r.prenom.trim()||!r.obs1||!r.obs2||!r.obs3){hasErr=true;return{...r,err:"Champs manquants"};}
    const v1=parseFloat(r.obs1),v2=parseFloat(r.obs2),v3=parseFloat(r.obs3);
    if([v1,v2,v3].some(v=>isNaN(v)||v<0||v>10)){hasErr=true;return{...r,err:"Valeur invalide (0-10)"};}
    rawValid.push({prenom:r.prenom.trim(),obs1:v1,obs2:v2,obs3:v3});
    return{...r,err:""};
  });
  if(hasErr){renderEntrySection();return;}
  if(!rawValid.length){alert("Ajoutez au moins un élève.");return;}
  S.students=computeStudents(rawValid);
  S.step=1; render();
}

function toggleAxe(id){
  const idx=S.selectedAxes.indexOf(id);
  if(idx!==-1){S.selectedAxes.splice(idx,1);}
  else{if(S.selectedAxes.length>=4){alert("Maximum 4 axes. Décochez un axe avant d'en sélectionner un autre.");return;}S.selectedAxes.push(id);}
  const axeCard=document.querySelector(`.axe-card[data-id="${id}"]`);
  if(axeCard){axeCard.classList.toggle("selected");const chk=axeCard.querySelector(".axe-check");if(chk)chk.textContent=S.selectedAxes.includes(id)?"✓":"";}
  const meta=document.getElementById("axes-meta");
  if(meta){meta.className="axes-meta "+(S.selectedAxes.length>=3?"ok":"warn");meta.textContent=`${S.selectedAxes.length} axe(s) sélectionné(s) · minimum 3 · maximum 4`;}
  const btn=document.getElementById("btn-next-axes");
  if(btn){btn.disabled=S.selectedAxes.length<3;btn.style.background=S.selectedAxes.length>=3?"#E8621A":"#D4DDE8";btn.textContent=S.selectedAxes.length>=3?"Paramétrer le cycle — Étape 3 →":`Sélectionnez encore ${3-S.selectedAxes.length} axe(s)`;}
}

}

function exportCSV(){
  const BOM="\uFEFF";
  const h=["Prénom","Code OBS-01","OBS-01","Code OBS-02","OBS-02","Code OBS-03","OBS-03","Moyenne","/20","Rang","Profil global","Profil détaillé","Lacune 1","SA recommandée"];
  const rows=S.students.map(s=>[
    s.prenom,s.profObs1,s.obs1,s.profObs2,s.obs2,s.profObs3,s.obs3,
    s.moyenne,s.note20,s.rang,s.profilGlobal,`${s.profObs1}/${s.profObs2}/${s.profObs3}`,
    s.lacunes[0]?`L1 — ${s.lacunes[0].label} : ${s.lacunes[0].score}/10`:"Aucune lacune",
    s.saRecommandee,
  ]);
  const csv=BOM+[h,...rows].map(r=>r.join(";")).join("\n");
  const today=new Date().toISOString().slice(0,10).replace(/-/g,"");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`outil_v0_VLB_DI-VLB_${today}.csv`; a.click();
}

  if(navBtn){navBtn.textContent=S.view==="home"?"Démarrer →":"← Accueil";navBtn.className="btn-nav "+(S.view==="home"?"start":"back");}

  if(stepsDiv){
    if(S.view!=="tool"){stepsDiv.innerHTML="";return;}
    const labels=["Saisie","Diagnostic","Axes","Paramétrage","Planification"];
    stepsDiv.innerHTML=labels.map((lbl,i)=>{
      const done=S.step>i, active=S.step===i;
      const cls=done?"done":active?"active":"";
      return `<div class="hdr-step ${cls}"><div class="hdr-step-dot">${done?"✓":i+1}</div><span class="hdr-step-lbl">${lbl}</span></div>${i<labels.length-1?`<div class="hdr-connector ${done?"done":""}"></div>`:""}`
    }).join("");
  }
}

function renderMain(){
  const mc=document.getElementById("main-content");
  if(!mc)return;
  if(S.view==="home"){mc.innerHTML=buildHome();}
  else if(S.step===0){mc.innerHTML=buildEntryForm();}
  else if(S.step===1){mc.innerHTML=buildStep1();}
  else if(S.step===2){mc.innerHTML=buildStep2();}
  else if(S.step===3){mc.innerHTML=buildStep3();}
  else if(S.step===4){mc.innerHTML=buildStep4();}
}

function render(){
  renderHeader();
  renderMain();
}

  return dist.map((nb,i)=>{

// ── STEP 4 PLANNING ───────────────────────────────────────────────────────────
function buildStep4(){
  const dist=getDistribution(S.selectedAxes.length,S.nbSeances);
  const selAxes=S.selectedAxes.map(id=>AXES.find(a=>a.id===id));
  const ss=S.students;
  const cA=ss.filter(s=>s.profilGlobal==="A").length, cB=ss.filter(s=>s.profilGlobal==="B").length, cC=ss.filter(s=>s.profilGlobal==="C").length;
  const dom=cA>=cB&&cA>=cC?"A":cC>=cA&&cC>=cB?"C":"B";
  let globalSeance=0;

  const planSections=dist.map((nbSq,seqIdx)=>{
    const axe=selAxes[seqIdx], prev=seqIdx>0?selAxes[seqIdx-1]:null;
    const axesTravailles=seqIdx===0?[axe]:seqIdx<dist.length-1?[prev,axe]:[axe];
    const titreSeq=seqIdx===0?"Fondamentaux — tous groupes":seqIdx===dist.length-1?"Consolidation B · Approfondissement C · Évaluation":"Différenciation A/B/C";
    const objSeq=seqIdx===0?`Construire les bases`:"Consolider les acquis et évaluer les progrès";

    const rows=[];
    for(let si=0;si<nbSq;si++){
      globalSeance++;
      const numS=globalSeance;
      const isLast=si===nbSq-1&&seqIdx===dist.length-1;
      const domAxe=si===0||seqIdx===0?axe:(prev||axe);
      const objSeance=isLast?"Évaluation formative / Tournoi officiel":(si===0?"Découvrir et expérimenter":"Pratiquer et consolider")+" — "+(domAxe?domAxe.titre.split(" ")[0]:"");
      const descA=si===0?"Observer et reproduire le geste de base avec aide":"Enchaîner 2 actions correctes sur 3 tentatives";
      const descB=si===0?"Choisir spontanément entre les 2 gestes selon la situation":"Réaliser 3 actions correctes consécutives en jeu réel";
      const descC=si===0?"Varier intentionnellement les gestes et zones de jeu":"Transférer les acquis en match avec projet de jeu";

      rows.push(`<tr${isLast?" style='background:#F0FDF4'":""}>
        <td class="td-seance">S${numS}</td>
        <td class="td-axe">${isLast?"Bilan":domAxe?"Axe "+domAxe.id:""}</td>
        <td class="td-obj">${esc(isLast?"Évaluation formative / Tournoi":objSeance)}</td>
        <td class="td-grp ga"><div class="td-grp-code">${isLast?"":domAxe?esc(domAxe.saAssociee.A.split(" — ")[0]):""}</div><div class="td-grp-desc">${isLast?"Tournoi 3c3 · observer les conduites · fiche bilan":esc(descA)}</div>${isLast?"":`<div class="td-grp-crit">Critère : ≥ 1 action réussie sur 3</div>`}</td>
        <td class="td-grp gb"><div class="td-grp-code">${isLast?"":domAxe?esc(domAxe.saAssociee.B.split(" — ")[0]):""}</div><div class="td-grp-desc">${isLast?"Tournoi 4c4 · arbitrage tournant · fiche C1/C2/C3":esc(descB)}</div>${isLast?"":`<div class="td-grp-crit">Critère : ≥ 2 actions réussies sur 3</div>`}</td>
        <td class="td-grp gc"><div class="td-grp-code">${isLast?"":domAxe?esc(domAxe.saAssociee.C.split(" — ")[0]):""}</div><div class="td-grp-desc">${isLast?"Match officiel · arbitrage autonome · rendre compte":esc(descC)}</div>${isLast?"":`<div class="td-grp-crit">Critère : ≥ 3 actions réussies sur 3</div>`}</td>
      </tr>`);

      if(!isLast&&si<nbSq-1){
        rows.push(`<tr class="indic-row"><td colspan="6" class="indic-content"><span>📋</span><span class="indic-note">À observer — ${domAxe?esc(domAxe.conduiteIndicateur):""}</span><span class="indic-sub">(Indicatif — décision de progression : vous)</span></td></tr>`);
      }
    }

    return `<div class="plan-section">
      <div class="seq-header">
        <div class="seq-info">
          <div class="seq-meta">Séquence ${seqIdx+1} · ${nbSq} séance(s)</div>
          <div class="seq-main-title">${esc(titreSeq)}</div>
          <div class="seq-obj">${esc(objSeq)}</div>
        </div>
        <div class="seq-axe-tags">${axesTravailles.map(a=>a?`<span class="seq-axe-tag">Axe ${a.id}</span>`:``).join("")}</div>
      </div>
      <div class="plan-table-wrap">
        <div class="plan-table">
          <table>
            <thead><tr><th>N° Séance</th><th>Axe dominant</th><th>Objectif de séance</th><th style="background:#FEF2F2">Groupe A — Débutants</th><th style="background:#FFFBEB">Groupe B — Intermédiaires</th><th style="background:#F0FDF4">Groupe C — Avancés</th></tr></thead>
            <tbody>${rows.join("")}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  });

  const domCnt=dom==="A"?cA:dom==="B"?cB:cC;

  return `
  <div class="tool-inner" style="max-width:1200px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:28px">
      <div><div class="step-tag">Étape 4 — Planification dynamique</div><h2 class="step-h">Cycle de ${S.nbSeances} séances · ${dist.length} séquences</h2></div>
      <button class="btn-export no-print" onclick="window.print()">🖨️ Imprimer</button>
    </div>

    ${planSections.join("")}

    <div class="card" style="margin-bottom:28px">
      <div class="card-head">Résumé du cycle</div>
      <div style="overflow-x:auto">
        <table class="resume-table">
          <thead><tr><th>Séquence</th><th>Axes travaillés</th><th>Nb séances</th><th>Profil dominant ciblé</th></tr></thead>
          <tbody>
            ${dist.map((nb,i)=>{
              const a=selAxes[i], pa=i>0?selAxes[i-1]:null;
              const cible=i===0?"A/B/C (tous groupes)":i===dist.length-1?"B (consolidation) · C (approfondissement)":"A/B/C (différenciation)";
              return `<tr><td style="font-family:'DM Mono',monospace;font-size:12px;color:#E8621A">Séq. ${i+1}</td><td style="font-family:'Literata',serif;font-size:12px;color:#2D4059">${i===0?`Axe ${a?a.id:""}`:`Axe ${pa?pa.id:""} + Axe ${a?a.id:""}`}</td><td style="font-family:'DM Mono',monospace;font-size:12px;color:#0B1F35">${nb}</td><td style="font-family:'Literata',serif;font-size:12px;color:#4A6278">${cible}</td></tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
      <div class="plan-footer">
        <p>Ce cycle de ${S.nbSeances} séances cible ${S.selectedAxes.length} axes prioritaires. Profil le plus concerné : ${dom} (${domCnt} élèves · ${Math.round(domCnt/ss.length*100)}%). Réévaluer après la séquence ${Math.ceil(dist.length/2)} avec une nouvelle collecte terrain.</p>
        <p class="note-tool">L'outil ne produit pas de note. La décision finale reste à l'enseignant.</p>
      </div>
    </div>

    <button class="btn-back no-print" onclick="goStep(3)">← Retour étape 3</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
